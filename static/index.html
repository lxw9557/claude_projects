<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent</title>
<style>
/* ===================================================================
   Fonts — Plus Jakarta Sans (UI) + JetBrains Mono (Code)
   =================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap');

/* ===================================================================
   Reset & Base
   =================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Background hierarchy — warm-tinted darks */
  --bg-root:    #0b0b0f;
  --bg-base:    #111114;
  --bg-surface: #17171c;
  --bg-card:    #1c1c23;
  --bg-hover:   #23232d;
  --bg-input:   #141418;

  /* Borders */
  --border:       #262632;
  --border-light: #1f1f2a;
  --border-glow:  rgba(224, 170, 59, 0.18);

  /* Text — warm white scale */
  --text:        #e4e1db;
  --text-secondary: #a19d95;
  --text-muted:  #65615b;
  --text-faint:  #3d3a36;

  /* Accent — warm amber/gold (like precision instrument indicator) */
  --accent:       #e0aa3b;
  --accent-soft:  #c8962f;
  --accent-glow:  rgba(224, 170, 59, 0.12);
  --accent-glow-strong: rgba(224, 170, 59, 0.22);

  /* Semantic */
  --green:        #7bb87c;
  --green-bg:     rgba(123, 184, 124, 0.08);
  --green-border: rgba(123, 184, 124, 0.25);
  --red:          #d4766c;
  --red-bg:       rgba(212, 118, 108, 0.08);
  --red-border:   rgba(212, 118, 108, 0.25);
  --blue:         #7da8d2;
  --yellow:       #e0aa3b;

  /* Typography */
  --font-ui:   'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-code: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 14px;

  /* Shadows */
  --shadow-card: 0 1px 0 rgba(255,255,255,0.03), 0 2px 8px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px var(--accent-glow);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg-root);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13.5px;
  font-weight: 400;
  line-height: 1.55;
  display: flex;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---- Subtle measurement-grid background ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 20px 20px;
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 8%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0.3) 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 8%, rgba(0,0,0,0.7) 30%, rgba(0,0,0,0.7) 80%, rgba(0,0,0,0.3) 100%);
}

/* ---- Subtle grain overlay ---- */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ===================================================================
   Layout
   =================================================================== */
#app {
  position: relative;
  z-index: 1;
  display: flex;
  width: 100%;
  height: 100%;
}

/* ---- Sidebar (Chat Panel) ---- */
#sidebar {
  width: 38%;
  min-width: 380px;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg-base);
}

/* ---- Header ---- */
#header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
  user-select: none;
  color: var(--text);
}

#header .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(123, 184, 124, 0.5);
  transition: background 0.3s, box-shadow 0.3s;
}
#header .dot.running {
  background: var(--yellow);
  box-shadow: 0 0 8px rgba(224, 170, 59, 0.6);
  animation: dot-pulse 1.4s ease-in-out infinite;
}

@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 6px rgba(224, 170, 59, 0.4); }
  50%      { box-shadow: 0 0 14px rgba(224, 170, 59, 0.8); }
}

/* ---- Chat Area ---- */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

/* ---- Messages ---- */
.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
  animation: msg-enter 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}

@keyframes msg-enter {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg.user {
  align-self: flex-end;
  background: var(--bg-hover);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-right-radius: 4px;
  font-weight: 450;
  box-shadow: var(--shadow-card);
}

.msg.info {
  align-self: center;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  max-width: 100%;
  border-radius: 6px;
  padding: 5px 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
  animation: msg-enter-info 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes msg-enter-info {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ---- Progress Card ---- */
.progress-card {
  align-self: flex-start;
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  animation: msg-enter 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-card);
  transition: border-color 0.3s, box-shadow 0.3s;
}

.progress-card .row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
}

.progress-card .icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}

.progress-card .label {
  font-size: 13px;
  flex: 1;
  font-weight: 500;
  letter-spacing: -0.005em;
}

.progress-card .status {
  font-size: 11.5px;
  color: var(--text-muted);
  font-family: var(--font-code);
  font-weight: 500;
  letter-spacing: -0.01em;
}

.progress-card .detail {
  font-size: 11.5px;
  color: var(--text-muted);
  padding: 0 14px 10px 40px;
  white-space: pre-wrap;
  max-height: 120px;
  overflow-y: auto;
  font-family: var(--font-code);
  line-height: 1.6;
  border-top: 1px solid var(--border-light);
  margin: 0 14px 0 40px;
  padding: 8px 0 10px 0;
}

.progress-card.done {
  border-left: 3px solid var(--green);
  border-color: var(--green-border);
  box-shadow: var(--shadow-card), 0 0 12px rgba(123, 184, 124, 0.04);
}
.progress-card.failed {
  border-left: 3px solid var(--red);
  border-color: var(--red-border);
  box-shadow: var(--shadow-card), 0 0 12px rgba(212, 118, 108, 0.04);
}
.progress-card.active {
  border-left: 3px solid var(--accent);
  border-color: var(--border-glow);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}

.progress-card .icon.ok  { color: var(--green); font-weight: 700; }
.progress-card .icon.err { color: var(--red); font-weight: 700; }
.progress-card .icon.spin {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Summary Card ---- */
.summary-card {
  align-self: flex-start;
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--green-border);
  border-radius: var(--radius);
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.7;
  box-shadow: var(--shadow-card), 0 0 16px rgba(123, 184, 124, 0.04);
  animation: msg-enter 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.summary-card h4 {
  font-size: 13.5px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--green);
  letter-spacing: -0.01em;
}

.summary-card .review-text {
  max-height: 160px;
  overflow-y: auto;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border-light);
  font-size: 12px;
  color: var(--text-muted);
  white-space: pre-wrap;
  line-height: 1.6;
  font-family: var(--font-code);
}

/* ---- Input Area ---- */
#input-area {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--bg-surface);
}

#input-area textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 450;
  padding: 10px 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: -0.005em;
}
#input-area textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
#input-area textarea::placeholder {
  color: var(--text-faint);
  font-weight: 400;
}

#input-area button {
  background: var(--accent);
  color: #1a1810;
  border: none;
  border-radius: var(--radius);
  padding: 0 18px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-ui);
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s, transform 0.1s, box-shadow 0.15s;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
#input-area button:hover {
  background: #e8b54f;
  box-shadow: 0 2px 12px var(--accent-glow);
}
#input-area button:active {
  transform: scale(0.97);
}
#input-area button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

/* ---- Content Panel ---- */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-root);
}

/* ---- Tabs ---- */
#tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 10px;
  gap: 2px;
  flex-shrink: 0;
  background: var(--bg-base);
}

#tabs button {
  background: none;
  border: none;
  color: var(--text-muted);
  padding: 11px 18px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  font-family: var(--font-ui);
  letter-spacing: -0.005em;
  position: relative;
}
#tabs button:hover { color: var(--text-secondary); }
#tabs button.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

#content-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

/* ---- File Tree ---- */
#files-panel { display: block; }
#diff-panel { display: none; }

.file-tree {
  padding: 6px 0;
}

.file-item {
  padding: 7px 18px;
  font-size: 12.5px;
  cursor: pointer;
  font-family: var(--font-code);
  color: var(--text-secondary);
  transition: background 0.12s, color 0.12s, padding 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
  letter-spacing: -0.01em;
}
.file-item:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-left-color: var(--border);
}
.file-item.selected {
  background: var(--bg-hover);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 500;
}

/* ---- File Viewer ---- */
#file-viewer {
  margin: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: viewer-enter 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-card);
}

@keyframes viewer-enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

#file-viewer .file-header {
  padding: 9px 16px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-light);
  font-size: 12px;
  font-family: var(--font-code);
  font-weight: 500;
  color: var(--text-secondary);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: -0.01em;
}

#file-viewer .file-header .close-btn {
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
  font-family: var(--font-ui);
}
#file-viewer .file-header .close-btn:hover { color: var(--text); }

#file-viewer .code-body {
  display: flex;
  max-height: calc(100vh - 160px);
  overflow: auto;
  font-family: var(--font-code);
  font-size: 12.5px;
  background: var(--bg-root);
}

.line-numbers {
  padding: 8px 0;
  text-align: right;
  user-select: none;
  background: var(--bg-base);
  border-right: 1px solid var(--border-light);
  min-width: 48px;
}

.line-numbers span {
  display: block;
  padding: 0 12px 0 8px;
  color: var(--text-faint);
  font-size: 11px;
  line-height: 1.7;
  font-weight: 400;
}

.code-lines {
  flex: 1;
  padding: 8px 0;
  overflow-x: auto;
}

.code-lines pre {
  padding: 0 16px;
  margin: 0;
  line-height: 1.7;
  white-space: pre;
  color: var(--text);
  font-weight: 400;
}

/* ---- Diff Viewer ---- */
.diff-viewer {
  margin: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  font-family: var(--font-code);
  font-size: 12px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  box-shadow: var(--shadow-card);
}

.diff-line {
  padding: 1px 16px;
  line-height: 1.7;
  white-space: pre-wrap;
  transition: background 0.1s;
}

.diff-line.add    { background: rgba(123, 184, 124, 0.08); color: var(--green); }
.diff-line.del    { background: rgba(212, 118, 108, 0.08); color: var(--red); }
.diff-line.header { color: var(--accent); font-weight: 600; background: var(--bg-surface); }
.diff-line.hunk   { color: var(--accent-soft); }
.diff-line.ctx    { color: var(--text-muted); }

/* ---- Empty State ---- */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-faint);
  font-size: 13.5px;
  gap: 8px;
  font-weight: 500;
  letter-spacing: -0.005em;
  user-select: none;
}

.empty-state .icon {
  font-size: 40px;
  opacity: 0.25;
  margin-bottom: 4px;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
::-webkit-scrollbar-corner { background: transparent; }

/* ---- Selection ---- */
::selection {
  background: rgba(224, 170, 59, 0.18);
  color: var(--text);
}

/* ===================================================================
   Responsive
   =================================================================== */
@media (max-width: 750px) {
  #app { flex-direction: column; }
  #sidebar { width: 100%; max-width: 100%; min-width: 0; height: 55%; }
  #content { height: 45%; }
  .msg { max-width: 95%; }
}
</style>
</head>
<body>

<div id="app">
  <!-- ====== Sidebar: Chat ====== -->
  <div id="sidebar">
    <div id="header">
      <span class="dot" id="status-dot"></span>
      <span>Coding Agent</span>
    </div>

    <div id="chat">
      <div class="msg info" id="welcome-msg">输入任务描述，代理将自动编写代码、运行测试和审查</div>
    </div>

    <div id="input-area">
      <textarea id="task-input" rows="1"
        placeholder="描述你想要实现的功能..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTask()}"></textarea>
      <button id="send-btn" onclick="sendTask()">发送</button>
    </div>
  </div>

  <!-- ====== Content Panel ====== -->
  <div id="content">
    <div id="tabs">
      <button class="active" onclick="switchTab('files')">Files</button>
      <button onclick="switchTab('diff')">Diff</button>
    </div>

    <div id="content-body">
      <div id="files-panel">
        <div class="file-tree" id="file-tree"></div>
        <div id="file-viewer" style="display:none"></div>
      </div>
      <div id="diff-panel">
        <div class="diff-viewer" id="diff-content"></div>
      </div>
    </div>
  </div>
</div>

<script>
// =========================================================================
// UI 文本配置 — 所有用户可见字符串集中管理
// =========================================================================
const TEXT = {
  welcome: '输入任务描述，代理将自动编写代码、运行测试和审查',
  placeholder: '描述你想要实现的功能...',
  busy: '已有任务正在运行，请等待完成...',
  running: '运行中...',
  coderDone: (n) => `完成 — 修改了 ${n} 个文件`,
  modifiedFiles: (files) => '修改文件: ' + files.join(', '),
  reviewDone: '审查完成',
  lint: 'Lint',
  tests: 'Tests',
  passed: (label, n) => `${label} 通过 (尝试 ${n} 次)`,
  failed: (label, n) => `${label} 失败 (尝试 ${n} 次)`,
  workflowComplete: '工作流完成',
  noFiles: '无',
  send: '发送',
};

// =========================================================================
// State
// =========================================================================
let currentFile = null;
let activeProgressCards = {};  // step_name -> DOM element
let running = false;

// =========================================================================
// Init
// =========================================================================
document.addEventListener('DOMContentLoaded', () => {
  loadFiles();
  loadDiff();
});

// =========================================================================
// File Tree
// =========================================================================
async function loadFiles() {
  try {
    const res = await fetch('/api/files');
    const data = await res.json();
    const tree = document.getElementById('file-tree');
    tree.innerHTML = data.files.map(f =>
      `<div class="file-item" onclick="openFile('${escapeHtml(f)}')" title="${escapeHtml(f)}">
        ${fileIcon(f)} ${escapeHtml(f)}
      </div>`
    ).join('');
  } catch(e) {
    console.error('Failed to load files:', e);
  }
}

function fileIcon(name) {
  const ext = name.split('.').pop();
  const icons = { py: '🐍', js: '📜', ts: '🔷', jsx: '⚛️', tsx: '⚛️', rs: '🦀', go: '🔵', java: '☕', c: '⚙️', cpp: '⚙️', h: '📋', css: '🎨', html: '🌐', json: '📋', md: '📝', yaml: '📋', yml: '📋', toml: '📋' };
  return icons[ext] || '📄';
}

async function openFile(path) {
  currentFile = path;
  try {
    const res = await fetch('/api/files/' + encodeURIComponent(path));
    if (!res.ok) { alert('Failed to load file: ' + path); return; }
    const data = await res.json();

    // Highlight selection in file tree
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('selected', el.textContent.trim().endsWith(path));
    });

    const viewer = document.getElementById('file-viewer');
    viewer.style.display = 'block';
    viewer.innerHTML = `
      <div class="file-header">
        <span>${escapeHtml(path)}</span>
        <button class="close-btn" onclick="closeFileViewer()">×</button>
      </div>
      <div class="code-body">
        <div class="line-numbers">${data.lines.map(l => `<span>${l.num}</span>`).join('')}</div>
        <div class="code-lines"><pre>${escapeHtml(data.content)}</pre></div>
      </div>`;
  } catch(e) {
    console.error('Failed to open file:', e);
  }
}

function closeFileViewer() {
  currentFile = null;
  document.getElementById('file-viewer').style.display = 'none';
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('selected'));
}

// =========================================================================
// Diff Viewer
// =========================================================================
async function loadDiff() {
  try {
    const res = await fetch('/api/diff');
    const data = await res.json();
    renderDiff(data.diff);
  } catch(e) {
    console.error('Failed to load diff:', e);
  }
}

function renderDiff(text) {
  const el = document.getElementById('diff-content');
  if (!text || text === 'No changes detected.') {
    el.innerHTML = '<div class="empty-state"><span class="icon">✓</span>No changes in workspace</div>';
    return;
  }
  const lines = text.split('\n');
  el.innerHTML = lines.map(line => {
    let cls = 'ctx';
    if (line.startsWith('diff --git')) cls = 'header';
    else if (line.startsWith('---') || line.startsWith('+++')) cls = 'header';
    else if (line.startsWith('@@')) cls = 'hunk';
    else if (line.startsWith('+')) cls = 'add';
    else if (line.startsWith('-')) cls = 'del';
    return `<div class="diff-line ${cls}">${escapeHtml(line)}</div>`;
  }).join('');
}

// =========================================================================
// Tabs
// =========================================================================
function switchTab(tab) {
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#tabs button${tab==='files' ? ':first-child' : ':last-child'}`).classList.add('active');
  document.getElementById('files-panel').style.display = tab === 'files' ? 'block' : 'none';
  document.getElementById('diff-panel').style.display = tab === 'diff' ? 'block' : 'none';
  if (tab === 'diff') loadDiff();
}

// =========================================================================
// Chat: Send Task
// =========================================================================
async function sendTask() {
  const input = document.getElementById('task-input');
  const task = input.value.trim();
  if (!task || running) return;

  running = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('status-dot').classList.add('running');
  activeProgressCards = {};

  addMessage('user', task);

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task })
    });

    if (response.status === 409) {
      addMessage('info', TEXT.busy);
      resetInput();
      return;
    }

    if (!response.ok) {
      const errText = await response.text();
      addErrorCard('chat', 'Request failed: ' + errText);
      resetInput();
      return;
    }

    await streamEvents(response);
  } catch(e) {
    addErrorCard('chat', 'Connection error: ' + e.message);
    resetInput();
  }
}

// =========================================================================
// SSE Streaming
// =========================================================================
async function streamEvents(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const parts = buffer.split('\n\n');
    buffer = parts.pop();  // keep incomplete last part

    for (const part of parts) {
      const lines = part.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const event = JSON.parse(line.slice(6));
            handleEvent(event);
          } catch(e) {}
        }
      }
    }
  }

  // Process remaining buffer
  if (buffer.trim()) {
    const lines = buffer.split('\n');
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        try { handleEvent(JSON.parse(line.slice(6))); } catch(e) {}
      }
    }
  }

  resetInput();
}

function handleEvent(event) {
  const type = event.type;
  const step = event.step;

  switch (type) {
    case 'step_start':
      if (step === 'workflow') {
        addMessage('info', event.message);
      } else {
        addProgressCard(step, event.message, event.iteration);
      }
      break;

    case 'step_done':
      if (step === 'coder') {
        finishProgressCard(step, 'done', TEXT.coderDone((event.modified_files || []).length));
        if (event.modified_files && event.modified_files.length > 0) {
          addProgressDetail(step, TEXT.modifiedFiles(event.modified_files));
        }
      } else if (step === 'review') {
        finishProgressCard(step, 'done', TEXT.reviewDone);
        addSummaryCard(event.review, event.state);
      }
      break;

    case 'step_error':
      finishProgressCard(step, 'failed', event.error);
      break;

    case 'check_result':
      if (event.passed) {
        finishProgressCard('check_' + event.check, 'done',
          TEXT.passed(event.check === 'lint' ? TEXT.lint : TEXT.tests, event.iteration));
      } else {
        finishProgressCard('check_' + event.check, 'failed',
          TEXT.failed(event.check === 'lint' ? TEXT.lint : TEXT.tests, event.iteration));
        if (event.output) {
          addProgressDetail('check_' + event.check, event.output);
        }
      }
      break;

    case 'done':
      loadFiles();
      loadDiff();
      break;
  }
}

// =========================================================================
// DOM Helpers
// =========================================================================
function addMessage(type, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  chat.appendChild(div);
  scrollChat();
  return div;
}

function addProgressCard(step, message, iteration) {
  const chat = document.getElementById('chat');
  const suffix = iteration ? `_${iteration}` : '';
  const cardId = step + suffix;

  const card = document.createElement('div');
  card.className = 'progress-card active';
  card.id = 'card-' + cardId;
  card.innerHTML = `
    <div class="row">
      <span class="icon spin"></span>
      <span class="label">${escapeHtml(message)}</span>
      <span class="status">${TEXT.running}</span>
    </div>`;
  chat.appendChild(card);
  scrollChat();
  activeProgressCards[cardId] = card;
  return card;
}

function finishProgressCard(step, status, message) {
  const card = activeProgressCards[step];
  if (!card) return;

  card.classList.remove('active');
  card.classList.add(status === 'done' ? 'done' : 'failed');

  const icon = card.querySelector('.icon');
  icon.classList.remove('spin');
  if (status === 'done') {
    icon.classList.add('ok');
    icon.textContent = '✓';
  } else {
    icon.classList.add('err');
    icon.textContent = '✗';
  }

  card.querySelector('.status').textContent = message;
  scrollChat();
}

function addProgressDetail(step, text) {
  const card = activeProgressCards[step];
  if (!card) return;

  let detail = card.querySelector('.detail');
  if (!detail) {
    detail = document.createElement('div');
    detail.className = 'detail';
    card.appendChild(detail);
  }
  detail.textContent = text;
  scrollChat();
}

function addErrorCard(step, error) {
  addProgressCard(step, 'Error', 0);
  finishProgressCard(step, 'failed', error);
}

function addSummaryCard(review, state) {
  const chat = document.getElementById('chat');
  const testResults = state?.test_results || {};
  const lintResults = state?.lint_results || {};
  const files = state?.modified_files || [];

  const testsPassed = testResults.passed ? '✓' : '✗';
  const lintPassed = lintResults.passed ? '✓' : '✗';

  const card = document.createElement('div');
  card.className = 'summary-card';
  card.innerHTML = `
    <h4>${TEXT.workflowComplete}</h4>
    <div>Tests: ${testsPassed} &nbsp;&nbsp; Lint: ${lintPassed}</div>
    <div>${TEXT.modifiedFiles(files.length > 0 ? files : [TEXT.noFiles])}</div>
    ${review ? `<div class="review-text">${escapeHtml(review)}</div>` : ''}`;
  chat.appendChild(card);
  scrollChat();
}

function scrollChat() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function resetInput() {
  running = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('status-dot').classList.remove('running');
  document.getElementById('task-input').focus();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Auto-resize textarea
document.getElementById('task-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
